<!doctype html>
<html data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>AEROMINE 3D Mall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="author" content="AEROMINE" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet" />
  <script defer type="module" src="src/main.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <span class="logo-text">AEROMINE</span>
      <h1 class="header-title">3D Mall Map</h1>
    </div>
    <div class="phase-toggle">
      <button id="phase-btn-1" class="phase-btn active">Phase 1</button>
      <button id="phase-btn-2" class="phase-btn">Phase 2</button>
    </div>
    <div class="header-hints">
      <span class="hint-pill">Left drag: Rotate</span>
      <span class="hint-pill">Right drag: Pan</span>
      <span class="hint-pill">Scroll: Zoom</span>
      <span class="hint-pill">Click tag: Details</span>
    </div>
  </header>
  <main class="wrap">
    <div id="app"></div>
    <div class="spinner" id="spinner"></div>
  </main>
  <footer class="site-footer">
    CREATED BY <strong>AEROMINE R&amp;D TEAM</strong>
    <span class="footer-sep">|</span>
    <a href="https://www.aeromine.info/" target="_blank" rel="noopener" class="footer-link">Website</a>
    <span class="footer-sep">·</span>
    <a href="https://www.linkedin.com/company/aeromine-info/" target="_blank" rel="noopener" class="footer-link">LinkedIn</a>
  </footer>

</html>
